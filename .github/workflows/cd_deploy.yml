name: esggo_vps_cd
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.ORACLE_VPS_SSH_KEY }}

      - name: Verify SSH
        run: |
          ssh -o BatchMode=yes -o StrictHostKeyChecking=accept-new ${{ secrets.ORACLE_VPS_USER }}@${{ secrets.ORACLE_VPS_HOST }} "echo SSH OK"

      - name: Upload deploy script
        run: |
          scp -q scripts/deploy-via-ssh.sh ${{ secrets.ORACLE_VPS_USER }}@${{ secrets.ORACLE_VPS_HOST }}:/tmp/esggo-remote-deploy.sh

      - name: Execute deploy on VPS
        run: |
          ssh -o BatchMode=yes ${{ secrets.ORACLE_VPS_USER }}@${{ secrets.ORACLE_VPS_HOST }} "bash /tmp/esggo-remote-deploy.sh; rc=$?; rm -f /tmp/esggo-remote-deploy.sh; exit $rc"

      - name: Health check
        if: always()
        run: |
          ssh -o BatchMode=yes ${{ secrets.ORACLE_VPS_USER }}@${{ secrets.ORACLE_VPS_HOST }} "curl -sf http://127.0.0.1/api/health || curl -sf http://127.0.0.1:8642/health || echo DEGRADED" || true
