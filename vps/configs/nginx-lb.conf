# Nginx Load Balancer Configuration for PM2 Cluster
# Place at: /etc/nginx/conf.d/upstream-esggo.conf

# Upstream for Next.js Cluster (PM2 manages workers)
upstream esggo_backend {
    # PM2 cluster workers on port 3000 (single port, multiple workers)
    server 127.0.0.1:3000;
    keepalive 32;
    
    # For multiple VPS instances, add more servers:
    # server 10.0.0.2:3000;
    # server 10.0.0.3:3000;
}

# Upstream for OmniAgent Gateway
upstream omni_gateway {
    server 127.0.0.1:8642;
    keepalive 16;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=100r/s;
limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name esggo.com www.esggo.com;

    ssl_certificate /etc/letsencrypt/live/esggo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/esggo.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript;

    # Main application
    location / {
        proxy_pass http://esggo_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        
        # Buffering
        proxy_buffering off;
        proxy_request_buffering off;
        
        # Rate limiting (general)
        limit_req zone=api burst=200 nodelay;
    }

    # API endpoints - stricter rate limiting
    location /api/ {
        proxy_pass http://esggo_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        limit_req zone=api burst=50 nodelay;
    }

    # Login/Authentication - very strict
    location /api/auth/ {
        proxy_pass http://esggo_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        
        limit_req zone=login burst=5 nodelay;
    }

    # OmniAgent Gateway
    location /omniagent-gateway/ {
        proxy_pass http://omni_gateway/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # SSE/WebSocket support
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Health check endpoint (no rate limit)
    location /api/health {
        proxy_pass http://esggo_backend;
        access_log off;
    }

    # Nginx status (internal only)
    location /nginx-status {
        stub_status;
        allow 127.0.0.1;
        deny all;
    }
}

# HTTP redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name esggo.com www.esggo.com;
    
    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    location / {
        return 301 https://$host$request_uri;
    }
}