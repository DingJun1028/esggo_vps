# vps/docker-compose.yml — 多服務編排
# 使用方式：docker-compose up -d

services:
  # Redis for async task state
  redis:
    image: redis:7-alpine
    container_name: esggo-redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - esggo-redis-data:/data
    restart: unless-stopped
    networks:
      - esggo-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: esggo-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-esggo-docker.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
      - nginx-cache:/var/cache/nginx
    depends_on:
      esggo:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - esggo-net

  # Next.js 主應用
  esggo:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: esggo-core
    environment:
      - NODE_ENV=production
      - PORT=3000
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-meta-llama/llama-3.3-70b-instruct:free}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - esggo-data:/app/public/uploads
    depends_on:
      redis:
        condition: service_healthy
      omniagent-gateway:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - esggo-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # OmniAgent Gateway
  omniagent-gateway:
    build:
      context: .
      dockerfile: vps/Dockerfile.gateway
    container_name: omniagent-gateway
    environment:
      - NODE_ENV=production
      - PORT=8642
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GATEWAY_API_KEY=${GATEWAY_API_KEY}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - esggo-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8642/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # Certbot 自動續約（僅背景續期，首次取得需手動初始化）
  certbot:
    image: certbot/certbot
    container_name: esggo-certbot
    profiles:
      - certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet --post-hook \"nginx -s reload\"; sleep 12h & wait $${!}; done;'"
    networks:
      - esggo-net

volumes:
  esggo-data:
  nginx-cache:
  esggo-redis-data:

networks:
  esggo-net:
    driver: bridge