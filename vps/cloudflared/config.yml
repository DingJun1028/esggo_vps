# =============================================================================
# Cloudflare Tunnel — VPS 暴露設定（生產最佳實踐）
# =============================================================================
# 用途：將 VPS 上的 esggo Next.js（127.0.0.1:3000）經 Cloudflare Tunnel 暴露到
#       自定網域，免去開 80/443、免公網 IP、自帶 TLS + Cloudflare 安全層。
#
# ⚠️ 帳戶 API 令牌角色：
#    Tunnel 在帳戶令牌相容性矩陣為 ✅。建立 Tunnel 可用「帳戶 API 令牌」
#    （權限：Tunnels: Edit）或 cloudflared login 互動產生憑證。
#    本設定採「不需把 cfat_ 寫進檔案」的最小暴露做法：用 cloudflared 登入產生
#    cert.pem（放在本目錄，已寫入 .gitignore），執行期由 cloudflared 自身讀取。
#
# 佈署步驟（在 VPS 上）：
#   1. 安裝 cloudflared（Debian/Ubuntu）：
#      curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -o /tmp/cf.deb
#      dpkg -i /tmp/cf.deb
#   2. 登入並建立憑證（互動一次，之後免令牌檔）：
#      cloudflared tunnel login          # 產生 ~/.cloudflared/cert.pem
#   3. 建立 tunnel（記下輸出的 tunnel id）：
#      cloudflared tunnel create esggo-vps
#   4. 把 config.yml 放到 /etc/cloudflared/config.yml（或本目錄），
#      將下方 <TUNNEL_ID> 與 hostname 換成實際值。
#   5. 路由 DNS：
#      cloudflared tunnel route dns esggo-vps app.esggo.example.com
#   6. 以 systemd 常駐（見 cloudflared.service）：
#      systemctl enable --now cloudflared
#
# 安全最佳實踐：
#   - 只 expose 必要的 hostname；不要 wildcard 把所有子域導進 VPS。
#   - 後端仍 bind 127.0.0.1（nginx 已慣例），cloudflared 走 localhost 即可。
#   - noTLSVerify 僅在 VPS 本地有自簽時才開；生產應讓 Cloudflare 終端 TLS。
#   - cert.pem / credentials 檔絕不進 git（見 .gitignore）。
# =============================================================================

tunnel: <TUNNEL_ID>
credentials-file: /etc/cloudflared/<TUNNEL_ID>.json

ingress:
  # 正式網域 → VPS 本地 Next.js
  - hostname: app.esggo.example.com
    service: http://127.0.0.1:3000
    originRequest:
      noTLSVerify: false
      httpHostHeader: app.esggo.example.com

  # 健康探針（可選，供監控）
  - hostname: health.esggo.example.com
    service: http://127.0.0.1:3000
    path: /api/health

  # 兜底：拒絕未列管的主機名
  - service: http_status:404
