# /etc/nginx/sites-available/omnigateway
# OmniAgent Gateway — separate virtual host for api.esggo.app
server {
    listen 80;
    server_name api.esggo.app;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.esggo.app;

    ssl_certificate /etc/nginx/ssl/esggo.crt;
    ssl_certificate_key /etc/nginx/ssl/esggo.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://localhost:8642;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # WebSocket endpoint
    location /ws {
        proxy_pass http://localhost:8642;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }
}
