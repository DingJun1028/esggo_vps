# ==============================================================================
# ESGGO Production Nginx Configuration (Ubuntu 24.04 / Oracle Cloud ARM64)
# Path: /etc/nginx/sites-available/esggo
# ==============================================================================

# HTTP - Redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name 161.118.248.180;

    # Let's Encrypt ACME challenge path
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    # Proxy to Next.js
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Gzip compression
        gzip on;
        gzip_vary on;
        gzip_proxied any;
        gzip_comp_level 6;
        gzip_types text/html text/plain text/css text/xml application/xhtml+xml application/json application/javascript application/x-javascript application/rss+xml application/atom+xml application/xml application/xml+rss image/svg+xml font/woff font/woff2;
        gzip_min_length 256;

        # Proxy Cache (semi-static API responses)
        proxy_cache esggo_api;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        proxy_cache_valid 200 302 10m;
        proxy_cache_valid 404 1m;
        proxy_cache_lock on;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        add_header X-Cache-Status $upstream_cache_status always;

        # SSE
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # OmniAgent Gateway
    location /omniagent-gateway/ {
        proxy_pass http://127.0.0.1:8642/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Public API cache tier (bypass with auth)
    location /api/v1/public-data/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache esggo_api;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        proxy_cache_valid 200 302 10m;
        proxy_cache_valid 404 1m;
        proxy_cache_lock on;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        add_header X-Cache-Status $upstream_cache_status always;
        proxy_read_timeout 120s;
    }

    # Dynamic API bypass (private/user data)
    location /api/v1/user-profile/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache esggo_api;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        proxy_cache_bypass $http_authorization $cookie_session_id;
        proxy_no_cache $http_authorization $cookie_session_id;
        add_header X-Cache-Status $upstream_cache_status always;
        proxy_read_timeout 120s;
    }

    # Nginx status
    location /nginx-status {
        stub_status;
        allow 127.0.0.1;
        deny all;
    }
}

# Proxy Cache zone declaration
proxy_cache_path /var/cache/nginx/esggo levels=1:2 keys_zone=esggo_api:100m inactive=60m max_size=512m use_temp_path=off;
proxy_ignore_headers Cache-Control Set-Cookie;
proxy_cache_key "$scheme$request_method$host$request_uri";
add_header X-Cache $upstream_cache_status always;

