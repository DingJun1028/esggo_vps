# =============================================================================
# ESG GO — Oracle VPS Production Deployment (ARM Ampere A1)
# =============================================================================
# 適用於 Oracle Cloud Always Free: 4 OCPU / 24 GB RAM / 200 GB Storage
#
# 使用方式:
#   1. 複製 .env.production 到 vps/.env 並填入金鑰
#   2. chmod +x setup-oracle-vps.sh && sudo ./setup-oracle-vps.sh
#   3. docker compose -f docker-compose.prod.yml up -d
#
# 與 docker-compose.yml 的差異:
#   - 加入 Oracle 保活服務 (oracle-keepalive)
#   - 增加記憶體/CPU 限制以符合 ARM 資源配置
#   - 啟用 Redis AOF 持久化
#   - 加入 Certbot 自動續約 profile
# =============================================================================

services:
  # ─── Redis快取/非同步任務狀態 ─────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: esggo-redis
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - esggo-redis-data:/data
    restart: unless-stopped
    networks:
      - esggo-net
    deploy:
      resources:
        limits:
          memory: 768M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ─── Nginx 反向代理 + SSL 終止 ────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: esggo-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # 使用現有 nginx 配置
      - ./nginx-esggo-docker.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
      - nginx-cache:/var/cache/nginx
    depends_on:
      esggo:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - esggo-net
    deploy:
      resources:
        limits:
          memory: 256M

  # ─── ESG GO 主應用 (Next.js) ──────────────────────────────────
  esggo:
    build:
      context: ..
      dockerfile: vps/Dockerfile.arm64
      args:
        - NODE_ENV=production
    container_name: esggo-core
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
      # AI Provider Keys (免費層)
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-meta-llama/llama-3.3-70b-instruct:free}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - AGNES_API=${AGNES_API:-}
      # Supabase (可選)
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL:-}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-}
      # Redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # Firebase (可選)
      - FIREBASE_SERVICE_ACCOUNT_JSON=${FIREBASE_SERVICE_ACCOUNT_JSON:-}
      - NEXT_PUBLIC_FIREBASE_PROJECT_ID=${NEXT_PUBLIC_FIREBASE_PROJECT_ID:-}
    volumes:
      - esggo-data:/app/public/uploads
      - esggo-reports:/app/reports
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - esggo-net
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: "3.0"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ─── OmniAgent Gateway (AI 代理閘道) ──────────────────────────
  omniagent-gateway:
    build:
      context: ..
      dockerfile: vps/Dockerfile.gateway
    container_name: omniagent-gateway
    environment:
      - NODE_ENV=production
      - PORT=8642
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GATEWAY_API_KEY=${GATEWAY_API_KEY:-}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - esggo-net
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8642/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ─── Certbot SSL 自動續約 ─────────────────────────────────────
  certbot:
    image: certbot/certbot
    container_name: esggo-certbot
    profiles:
      - certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet --post-hook \"nginx -s reload\"; sleep 12h & wait $${!}; done;'"
    networks:
      - esggo-net

  # ─── Oracle 保活服務 (防止閒置回收) ───────────────────────────
  oracle-keepalive:
    image: alpine:latest
    container_name: esggo-keepalive
    restart: unless-stopped
    networks:
      - esggo-net
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.3"
    entrypoint: >
      /bin/sh -c "
      echo '[keepalive] Oracle VPS keepalive started';
      while true; do
        timeout 60 dd if=/dev/urandom of=/dev/null bs=1M count=10 2>/dev/null;
        sleep 240;
      done
      "

volumes:
  esggo-data:
  esggo-reports:
  nginx-cache:
  esggo-redis-data:

networks:
  esggo-net:
    driver: bridge
