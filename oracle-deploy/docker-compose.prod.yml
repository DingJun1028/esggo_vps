# ============================================================
# ESG GO - Oracle Always Free Production Deployment
# VM.Standard.A1.Flex: 2 OCPUs / 12GB RAM
# ============================================================

version: '3.9'

services:
  # ============================================================
  # Nginx - 反向代理 + TLS 終止
  # ============================================================
  nginx:
    image: nginx:alpine
    container_name: esggo-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./public:/app/public:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      nextjs:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  # ============================================================
  # Next.js - 應用伺服器
  # ============================================================
  nextjs:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
    container_name: esggo-app
    environment:
      - NODE_ENV=production
      - PORT=3000
      # 資料庫
      - DATABASE_URL=${DATABASE_URL}
      # Redis
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      # Firebase
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      - FIREBASE_CLIENT_EMAIL=${FIREBASE_CLIENT_EMAIL}
      - FIREBASE_PRIVATE_KEY=${FIREBASE_PRIVATE_KEY}
      # AI API Keys
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - HF_TOKEN=${HF_TOKEN}
      # 其他
      - REFERER=${REFERER:-https://esggo.ai}
      - HEALTH_CHECK_PATH=/healthz
    volumes:
      - app_data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/healthz').on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 8G
        reservations:
          cpus: '0.5'
          memory: 2G

  # ============================================================
  # Redis - 快取 + 會話儲存
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: esggo-redis
    command: >
      redis-server
      --appendonly yes
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --save 300 10
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 1G

  # ============================================================
  # Cron - 防閒置回收 + 定期任務
  # ============================================================
  cron:
    image: alpine:latest
    container_name: esggo-cron
    command: >
      sh -c "echo '*/5 * * * * wget -q -O- http://nextjs:3000/api/health > /dev/null 2>&1' > /etc/crontabs/root &&
             echo '0 * * * * wget -q -O- http://nextjs:3000/api/cron/hourly > /dev/null 2>&1' >> /etc/crontabs/root &&
             crond -f -l 2"
    depends_on:
      - nextjs
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 64M

volumes:
  redis_data:
    driver: local
  app_data:
    driver: local
  nginx_logs:
    driver: local

# ============================================================
# 網路設定
# ============================================================
networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
